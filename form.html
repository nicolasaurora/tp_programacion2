<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <header>

        <nav>
            <ul>
                <li><a href="">Inicio</a></li>
                <li><a href="">Ranking</a></li>
                <li><a href="">Reglas del juego</a></li>
            </ul>
        </nav>

    </header>

    <main>

        <form action="">

            <div>
                <label for="">Nombre:</label>
                <input type="text" required>
            </div>

            <div>
                <label for="">Apellido:</label>
                <input type="text" required>
            </div>

            <div>
                <label for="">Email:</label>
                <input type="email" required>
            </div>

            <div>
                <label for="">Telefono:</label>
                <input type="number" required>
            </div>

            <div>
                <label for="">Fecha de nacimiento:</label>
                <input type="date" required>
            </div>

            <div>
                <legend>Seleccionar sexo:</legend>
                <input type="radio" name="sexo" checked>
                <label for="">Masculino</label><br>
                <input type="radio" name="sexo">
                <label for="">Femenino</label><br>
                <input type="radio" name="sexo">
                <label for="">Otro</label>
            </div>

            <div>
                <label for="">Ha jugado alguna vez juego de memoria?</label>
                <Select>
                    <option value="valor1">Si</option>
                    <option value="valor2">No</option>
                </Select>
            </div>

            <div>
                <button type="submit">Enviar registro</button>
                <button>Iniciar Juego</button>
            </div>                                                                                   
        </form>

    </main>


    <footer>
        <span>&copy; Todos los derechos Reservados 2026.</span>
    </footer>
    
    
</body>
</html>
